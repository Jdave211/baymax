name: Baymax
options:
  bundleIdPrefix: com.baymax
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Baymax:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.baymax.assistant
        PRODUCT_NAME: Baymax
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Baymax.entitlements
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: false
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
    postBuildScripts:
      - name: "Install to ~/Applications"
        inputFiles:
          - "$(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app"
          - "$(SRCROOT)/Resources"
          - "$(SRCROOT)/assets"
          - "$(SRCROOT)/Scripts/install_to_app.sh"
        outputFiles:
          - "$(DERIVED_FILE_DIR)/Baymax.install.stamp"
        script: |
          bash "$SRCROOT/Scripts/install_to_app.sh"
